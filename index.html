<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>16人格挽回大挑战</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#f8f4f0;color:#2c2418;min-height:100vh}
.bg{position:fixed;inset:0;z-index:-1;background:linear-gradient(135deg,#f8f4f0,#f0e8e0,#f8f0e8)}
.bg::before{content:'';position:absolute;top:-30%;right:-20%;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(212,117,143,.08),transparent 70%)}
.bg::after{content:'';position:absolute;bottom:-20%;left:-10%;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(74,144,217,.06),transparent 70%)}

.hd{padding:36px 20px 20px;text-align:center;position:relative}
.hd h1{font-size:26px;font-weight:800;letter-spacing:2px;background:linear-gradient(135deg,#2c2418,#6a5a48);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hd p{font-size:13px;color:#9a8a78;margin-top:6px;letter-spacing:1px}

.ct{max-width:680px;margin:0 auto;padding:0 14px 20px}

/* Brand card - glassmorphism */
.brand{background:rgba(255,255,255,.7);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.8);border-radius:20px;padding:18px;margin-bottom:18px;display:flex;align-items:center;gap:16px;box-shadow:0 4px 24px rgba(0,0,0,.04)}
.brand img{width:96px;height:96px;border-radius:12px;flex-shrink:0;object-fit:cover;border:2px solid rgba(255,255,255,.8)}
.brand .bn{font-size:18px;font-weight:800;color:#2c2418;letter-spacing:2px}
.brand .bs{font-size:12px;color:#9a8a78;margin-top:4px;line-height:1.6}

.s{font-size:12px;font-weight:600;color:#9a8a78;padding:0 4px;margin:14px 0 10px;letter-spacing:3px;display:flex;align-items:center;gap:10px}
.s::before,.s::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(0,0,0,.06),transparent)}

.gr{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:4px}
.card{background:rgba(255,255,255,.75);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.8);border-radius:16px;padding:14px 6px;text-align:center;text-decoration:none;color:#2c2418;transition:all .25s;box-shadow:0 2px 12px rgba(0,0,0,.03)}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.06);background:rgba(255,255,255,.9)}
.card:active{transform:scale(.95)}
.card .e{font-size:22px;margin-bottom:2px;display:block}
.card .n{font-size:13px;font-weight:700;display:block}
.card .t{font-size:10px;color:#9a8a78;display:block;margin-top:2px}
.card .tag{font-size:8px;padding:2px 6px;border-radius:4px;display:inline-block;margin-top:4px;background:#e8f5e9;color:#2e7d32}

.ft{font-size:10px;color:#c0b0a0;text-align:center;margin-top:20px;line-height:1.6;padding-bottom:20px}

@media(max-width:420px){
  .card{padding:12px 4px}
  .card .e{font-size:18px}
  .card .n{font-size:12px}
  .brand img{width:72px;height:72px}
  .hd h1{font-size:22px}
}
</style>
</head>
<body>
<div class="bg"></div>
<div class="hd"><h1>🧩 16人格挽回大挑战</h1><p>选一个人格，测测你能不能挽回TA的心</p></div>

  <div>

    <div class="bs">想自己搭这种测试？扫码聊聊<br>网站 · 小程序 · H5 · AI产品</div>
  </div>
</div>

</div>

<a class="card" href="https://3105950381zz-rgb.github.io/challenge-infp/"><span class="e">🌸</span><span class="n">INFP</span><span class="t">调停者</span><span class="tag">🔥</span></a>
<a class="card" href="https://3105950381zz-rgb.github.io/challenge-enfj/"><span class="e">🦁</span><span class="n">ENFJ</span><span class="t">主人公</span><span class="tag">🔥</span></a>
<a class="card" href="https://3105950381zz-rgb.github.io/challenge-enfp/"><span class="e">🐶</span><span class="n">ENFP</span><span class="t">竞选者</span><span class="tag">🔥</span></a>
</div>

<a class="card" href="https://3105950381zz-rgb.github.io/challenge-isfj/"><span class="e">🛡️</span><span class="n">ISFJ</span><span class="t">守卫者</span><span class="tag">🔥</span></a>
<a class="card" href="https://3105950381zz-rgb.github.io/challenge-estj/"><span class="e">📊</span><span class="n">ESTJ</span><span class="t">总经理</span><span class="tag">🔥</span></a>

<a class="card" href="https://3105950381zz-rgb.github.io/challenge-estp/"><span class="e">🔥</span><span class="n">ESTP</span><span class="t">企业家</span><span class="tag">🔥</span></a>
<a class="card" href="https://3105950381zz-rgb.github.io/challenge-esfp/"><span class="e">🎉</span><span class="n">ESFP</span><span class="t">表演者</span><span class="tag">🔥</span></a>

<div class="ft">灵客星球 · 帮你搭专属引流测试<br>H5/小程序/网站 · 69起</div>

</body>
</html>
