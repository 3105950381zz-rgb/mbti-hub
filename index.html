<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>16人格挽回大挑战</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter','PingFang SC','Microsoft YaHei',sans-serif;background:#0f0f0f;color:#f0ece4;min-height:100vh;overflow-x:hidden}

/* Animated Background */
.bg{position:fixed;inset:0;z-index:-2;background:#0f0f0f}
.bg-grid{position:fixed;inset:0;z-index:-1;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:60px 60px}
.glow1{position:fixed;top:-20%;left:-10%;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(180,130,255,.12),transparent 70%);z-index:-1;animation:float 20s ease-in-out infinite}
.glow2{position:fixed;bottom:-20%;right:-10%;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(255,150,100,.08),transparent 70%);z-index:-1;animation:float2 25s ease-in-out infinite}
@keyframes float{0%,100%{transform:translate(0,0)}50%{transform:translate(60px,-40px)}}
@keyframes float2{0%,100%{transform:translate(0,0)}50%{transform:translate(-50px,60px)}}

/* Header */
.hd{text-align:center;padding:48px 20px 32px;position:relative}
.hd-badge{display:inline-block;padding:4px 16px;border-radius:999px;font-size:11px;font-weight:600;background:rgba(180,130,255,.1);color:#b482ff;letter-spacing:2px;margin-bottom:16px;border:1px solid rgba(180,130,255,.15)}
.hd h1{font-size:32px;font-weight:800;letter-spacing:-1px;background:linear-gradient(135deg,#f0ece4,#b482ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.2}
.hd p{font-size:14px;color:rgba(240,236,228,.4);margin-top:8px;font-weight:400;letter-spacing:.5px}

.ct{max-width:720px;margin:0 auto;padding:0 20px 40px}

/* Brand Card */
.brand{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:20px;padding:20px;margin-bottom:24px;display:flex;align-items:center;gap:18px;transition:all .3s}
.brand:hover{border-color:rgba(180,130,255,.2);background:rgba(255,255,255,.06)}
.brand img{width:88px;height:88px;border-radius:14px;flex-shrink:0;object-fit:cover;border:1px solid rgba(255,255,255,.08)}
.brand .bn{font-size:17px;font-weight:700;color:#f0ece4;letter-spacing:3px}
.brand .bs{font-size:12px;color:rgba(240,236,228,.35);margin-top:4px;line-height:1.6}
.brand .tag{display:inline-block;padding:3px 10px;border-radius:6px;font-size:10px;font-weight:600;background:rgba(180,130,255,.1);color:#b482ff;margin-top:6px}

/* Section divider */
.sec{display:flex;align-items:center;gap:14px;margin:20px 0 12px;padding:0 4px}
.sec span{font-size:11px;font-weight:600;color:rgba(240,236,228,.3);letter-spacing:3px;text-transform:uppercase}
.sec-line{flex:1;height:1px;background:linear-gradient(90deg,rgba(255,255,255,.06),transparent)}

/* Grid */
.gr{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}

/* Card */
.card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:16px 8px;text-align:center;text-decoration:none;color:#f0ece4;transition:all .3s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;opacity:0;transition:opacity .3s;border-radius:16px 16px 0 0}
.card:hover{transform:translateY(-4px);border-color:rgba(180,130,255,.2);background:rgba(255,255,255,.05);box-shadow:0 12px 40px rgba(0,0,0,.3)}
.card:hover::before{opacity:1}
.card:active{transform:scale(.96)}

.card .avatar{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;margin:0 auto 8px;transition:all .3s}
.card:hover .avatar{transform:scale(1.1);border-radius:10px}
.card .code{font-size:14px;font-weight:700;letter-spacing:1px;display:block}
.card .name{font-size:10px;color:rgba(240,236,228,.35);display:block;margin-top:2px}

/* Category color coding */
.sec-c0 .card::before,.card.c0::before{background:linear-gradient(90deg,#6366f1,#8b5cf6)}
.sec-c1 .card::before,.card.c1::before{background:linear-gradient(90deg,#ec4899,#f472b6)}
.sec-c2 .card::before,.card.c2::before{background:linear-gradient(90deg,#14b8a6,#2dd4bf)}
.sec-c3 .card::before,.card.c3::before{background:linear-gradient(90deg,#f59e0b,#f97316)}

.sec-c0 .avatar{background:rgba(99,102,241,.1);color:#818cf8}
.sec-c1 .avatar{background:rgba(236,72,153,.1);color:#f472b6}
.sec-c2 .avatar{background:rgba(20,184,166,.1);color:#2dd4bf}
.sec-c3 .avatar{background:rgba(245,158,11,.1);color:#fbbf24}

/* Footer */
.ft{font-size:10px;color:rgba(240,236,228,.2);text-align:center;margin-top:32px;line-height:1.8;padding-bottom:20px;letter-spacing:.5px}
.ft a{color:rgba(180,130,255,.4);text-decoration:none}

@media(max-width:480px){
  .hd{padding:36px 16px 24px}
  .hd h1{font-size:26px}
  .gr{gap:6px}
  .card{padding:14px 6px}
  .card .avatar{width:34px;height:34px;font-size:15px}
  .card .code{font-size:12px}
  .brand{padding:16px}
  .brand img{width:64px;height:64px}
}
</style>
</head>
<body>
<div class="bg"></div>
<div class="bg-grid"></div>
<div class="glow1"></div>
<div class="glow2"></div>

<div class="hd">
  <div class="hd-badge">✦ 16 Personalities</div>
  <h1>挽回大挑战</h1>
  <p>选一个人格 · 测测你能不能挽回TA的心</p>
</div>

<div class="ct">

<div class="brand">
  <img src="qrcode.jpg"/>
  <div>
    <div class="bn">灵客星球</div>
    <div class="bs">灵客星球 · 让AI为你所用</div>
  </div>
</div>

<div class="sec sec-c0"><span>分析家</span><div class="sec-line"></div></div>
<div class="gr sec-c0">
  <a class="card c0" href="https://3105950381zz-rgb.github.io/challenge-intj/"><div class="avatar">🏛️</div><span class="code">INTJ</span><span class="name">建筑师</span></a>
  <a class="card c0" href="https://3105950381zz-rgb.github.io/challenge-intp/"><div class="avatar">🔬</div><span class="code">INTP</span><span class="name">逻辑家</span></a>
  <a class="card c0" href="https://3105950381zz-rgb.github.io/challenge-entj/"><div class="avatar">👑</div><span class="code">ENTJ</span><span class="name">指挥官</span></a>
  <a class="card c0" href="https://3105950381zz-rgb.github.io/challenge-entp/"><div class="avatar">🎯</div><span class="code">ENTP</span><span class="name">辩论家</span></a>
</div>

<div class="sec sec-c1"><span>外交家</span><div class="sec-line"></div></div>
<div class="gr sec-c1">
  <a class="card c1" href="https://3105950381zz-rgb.github.io/challenge-infj/"><div class="avatar">🦋</div><span class="code">INFJ</span><span class="name">提倡者</span></a>
  <a class="card c1" href="https://3105950381zz-rgb.github.io/challenge-infp/"><div class="avatar">🌸</div><span class="code">INFP</span><span class="name">调停者</span></a>
  <a class="card c1" href="https://3105950381zz-rgb.github.io/challenge-enfj/"><div class="avatar">🦁</div><span class="code">ENFJ</span><span class="name">主人公</span></a>
  <a class="card c1" href="https://3105950381zz-rgb.github.io/challenge-enfp/"><div class="avatar">🐶</div><span class="code">ENFP</span><span class="name">竞选者</span></a>
</div>

<div class="sec sec-c2"><span>守护者</span><div class="sec-line"></div></div>
<div class="gr sec-c2">
  <a class="card c2" href="https://3105950381zz-rgb.github.io/challenge-istj/"><div class="avatar">📋</div><span class="code">ISTJ</span><span class="name">物流师</span></a>
  <a class="card c2" href="https://3105950381zz-rgb.github.io/challenge-isfj/"><div class="avatar">🛡️</div><span class="code">ISFJ</span><span class="name">守卫者</span></a>
  <a class="card c2" href="https://3105950381zz-rgb.github.io/challenge-estj/"><div class="avatar">📊</div><span class="code">ESTJ</span><span class="name">总经理</span></a>
  <a class="card c2" href="https://3105950381zz-rgb.github.io/challenge-esfj/"><div class="avatar">🤝</div><span class="code">ESFJ</span><span class="name">执政官</span></a>
</div>

<div class="sec sec-c3"><span>探险家</span><div class="sec-line"></div></div>
<div class="gr sec-c3">
  <a class="card c3" href="https://3105950381zz-rgb.github.io/challenge-istp/"><div class="avatar">🔧</div><span class="code">ISTP</span><span class="name">鉴赏家</span></a>
  <a class="card c3" href="https://3105950381zz-rgb.github.io/challenge-isfp/"><div class="avatar">🎨</div><span class="code">ISFP</span><span class="name">探险家</span></a>
  <a class="card c3" href="https://3105950381zz-rgb.github.io/challenge-estp/"><div class="avatar">🔥</div><span class="code">ESTP</span><span class="name">企业家</span></a>
  <a class="card c3" href="https://3105950381zz-rgb.github.io/challenge-esfp/"><div class="avatar">🎉</div><span class="code">ESFP</span><span class="name">表演者</span></a>
</div>

<div class="ft">灵客星球</div>
</div>
</body>
</html>
